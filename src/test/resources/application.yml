spring:
  application:
    name: review-gateway-test
  jpa:
    hibernate:
      ddl-auto: validate            # schema owned by Flyway only; Zonky provides the datasource
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  test:
    database:
      replace: none                 # Zonky's @AutoConfigureEmbeddedDatabase supplies the DataSource
