spring:
  application:
    name: review-gateway
  threads:
    virtual:
      enabled: true                 # Java 21 virtual threads (requirements §2.1)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/review_gateway}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate            # schema owned by Flyway only
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

server:
  port: 8080
  max-http-request-header-size: 16KB

management:
  endpoints:
    web:
      exposure:
        include: health             # NO prometheus; business metrics = custom /metrics
  endpoint:
    health:
      probes:
        enabled: true

gateway:
  diff:
    context-window: 16384
    prompt-reserve: 2000
    answer-reserve: 4000
    max-diff-tokens: 10000          # derived cap; DIFF_TOO_LARGE above this
    chars-per-token: 4              # heuristic for the token estimator
    max-request-body-bytes: 100000  # SR-11 edge cap for POST /reviews
  heartbeat:
    interval: 60s                   # expected worker ping cadence
    timeout: 180s                   # stuck if now - heartbeat_at exceeds this
  retry:
    max-attempts: 3
  job:
    max-duration: 45m               # hard cap backstop
  publish:
    max-comment-count: 50
    max-comment-length: 4000
    max-raw-response-length: 200000 # SR-21
    max-request-body-bytes: 500000  # SR-11 edge cap for POST /jobs/{id}/result
  scheduler:
    heartbeat-check-interval: 30s
    backend-health-interval: 60s
    publish-retry-interval: 60s
  gitlab:
    base-url: ${GITLAB_BASE_URL:https://gitlab.example.com/api/v4}
    token: ${GITLAB_TOKEN}          # masked in toString; only Gateway holds this
    connect-timeout: 5s
    read-timeout: 30s
  backend:
    connect-timeout: 3s
    read-timeout: 5s
    allowed-host-pattern: ${BACKEND_ALLOWED_HOST_PATTERN:.*}   # SR-10: tighten per deployment
  security:
    ci-token: ${CI_TOKEN}
    worker-token: ${WORKER_TOKEN}
    admin-token: ${ADMIN_TOKEN}

# NOTE: gateway.security.*/gateway.gitlab.token MUST be >=32 chars (SR-01) and
# gateway.gitlab.base-url MUST be https:// (SR-15) -- GatewayProperties fails startup otherwise.
# All four secrets come from environment variables, never committed (see systemd EnvironmentFile /
# a local .env excluded from version control for a dev deployment).
