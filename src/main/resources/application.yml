spring:
  application:
    name: review-gateway
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate            # schema owned by Flyway only
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# NOTE: this is a minimal skeleton for feature/01-data-model (entities + repositories only).
# The full config surface (datasource, security tokens, gateway.* properties, RestClient timeouts,
# scheduler intervals) is added in feature/03-api-security per docs/implementation-architecture.md §9.
